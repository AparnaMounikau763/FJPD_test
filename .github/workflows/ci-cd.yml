name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:

# =========================
# 🧪 BUILD + TEST + SONAR
# =========================
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    # 🔥 CRITICAL FIX (THIS SOLVES YOUR ERROR)
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

    - name: Run tests with coverage
      run: |
        pytest --cov=app --cov-report=xml


# =========================
# 🐳 DOCKER BUILD & PUSH (JFROG)
# =========================
  docker:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to JFrog Docker Registry
      run: |
        echo "${{ secrets.JFROG_PASSWORD }}" | docker login ${{ secrets.JFROG_URL }} \
        -u ${{ secrets.JFROG_USERNAME }} --password-stdin

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.JFROG_URL }}/fjpd-docker-local/fjpd-app:${{ github.sha }} .

    - name: Tag latest image
      run: |
        docker tag ${{ secrets.JFROG_URL }}/fjpd-docker-local/fjpd-app:${{ github.sha }} \
                   ${{ secrets.JFROG_URL }}/fjpd-docker-local/fjpd-app:latest

    - name: Push Docker image
      run: |
        docker push ${{ secrets.JFROG_URL }}/fjpd-docker-local/fjpd-app:${{ github.sha }}
        docker push ${{ secrets.JFROG_URL }}/fjpd-docker-local/fjpd-app:latest


# =========================
# ☸️ DEPLOY TO AWS EKS
# =========================
  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Update kubeconfig for EKS
      run: |
        aws eks update-kubeconfig \
          --region ${{ secrets.AWS_REGION }} \
          --name ${{ secrets.EKS_CLUSTER_NAME }}

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml
